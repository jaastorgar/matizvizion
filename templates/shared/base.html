{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="{% static 'shared/img/favicon.ico' %}" />
  <link rel="apple-touch-icon" href="{% static 'shared/img/favicon.ico' %}" />
  <title>{% block title %}Matizvisión{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Inter+Tight:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="{% static 'shared/css/global.css' %}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% include 'shared/navbar.html' %}
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>
  {% include 'shared/footer.html' %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'shared/js/utils.js' %}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var MV = window.MV; if (!MV || !MV.me) return;
      var path = location.pathname;
      var comercial = ['/catalogo/', '/carrito/', '/checkout/', '/citas/', '/perfil/'];
      MV.me().then(function (u) {
        if (!u) return;
        var isStaff = (u.role === 'VENDEDOR' || u.role === 'ADMIN');
        if (isStaff && comercial.indexOf(path) !== -1) { location.replace('/panel/'); return; }
        if (!isStaff && path === '/panel/') { location.replace('/catalogo/'); return; }
        if (!isStaff && MV.refreshCartBadge) MV.refreshCartBadge();
      });
    });
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
