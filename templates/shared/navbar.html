    <a class="navbar-brand" href="/">Óptica Matiz Visión</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mvNav"><span class="navbar-toggler-icon"></span></button>
    <div class="collapse navbar-collapse" id="mvNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item nav-public d-none"><a class="nav-link" href="/catalogo/">Catálogo</a></li>
        <li class="nav-item nav-public d-none"><a class="nav-link" href="/citas/">Agendar cita</a></li>
      </ul>
      <ul class="navbar-nav align-items-lg-center">
        <li class="nav-item nav-public d-none"><a class="nav-link position-relative" href="/carrito/">🛒 Carrito <span id="cart-badge" hidden>0</span></a></li>
        <li class="nav-item nav-guest d-none"><a class="nav-link" href="/login/">Ingresar</a></li>
        <li class="nav-item nav-guest d-none"><a class="btn btn-cta btn-sm ms-lg-2" href="/register/">Registrarme</a></li>
        <li class="nav-item nav-auth d-none"><span class="nav-link">👤 <span id="nav-user-email">Cuenta</span></span></li>
        <li class="nav-item nav-client d-none"><a class="nav-link" href="/perfil/">⚙️ Mi perfil</a></li>
        <li class="nav-item nav-staff d-none"><a class="nav-link" href="/panel/">📋 Panel</a></li>
        <li class="nav-item nav-auth d-none"><button class="btn btn-outline-mv btn-sm" id="nav-logout" type="button">Salir</button></li>
      </ul>

  </div>
</nav>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var MV = window.MV; if (!MV || !MV.me) return;
    function qsa(s){ return Array.prototype.slice.call(document.querySelectorAll(s)); }
    function toggle(sel, show){ qsa(sel).forEach(function(e){ e.classList.toggle('d-none', !show); }); }
    var emailEl = document.getElementById('nav-user-email');
    var out = document.getElementById('nav-logout');
    MV.me().then(function (u) {
      var isAuth = !!u;
      var isStaff = isAuth && (u.role === 'VENDEDOR' || u.role === 'ADMIN');
      var isClient = isAuth && !isStaff;
      toggle('.nav-guest', !isAuth);
      toggle('.nav-public', !isStaff);
      toggle('.nav-auth', isAuth);
      toggle('.nav-client', isClient);
      toggle('.nav-staff', isStaff);
      if (isAuth && emailEl) emailEl.textContent = u.email || 'Cuenta';
    });
    if (out) out.addEventListener('click', function () { MV.auth.logout(true); });
  });
</script>
