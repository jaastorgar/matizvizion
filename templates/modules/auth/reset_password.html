{% extends 'shared/base.html' %}
{% load static %}
{% block title %}Nueva contraseña — Matizvisión{% endblock %}
{% block extra_css %}<link rel="stylesheet" href="{% static 'modules/auth/auth.css' %}" />{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="mv-auth-card p-4">
      <h1 class="h4 mb-1"><i class="bi bi-shield-lock"></i> Nueva contraseña</h1>
      <p class="text-secondary mb-3">Crea tu nueva contraseña (mínimo 8 caracteres).</p>
      <form id="rp-form" novalidate>
        <div class="mb-3">
          <label class="form-label" for="rp-pw">Nueva contraseña</label>
          <input type="password" class="form-control" id="rp-pw" minlength="8" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="rp-pw2">Repite la contraseña</label>
          <input type="password" class="form-control" id="rp-pw2" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-cta w-100" id="rp-btn">Guardar contraseña</button>
        <p id="rp-msg" class="text-center mt-3 mb-0"></p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}<script src="{% static 'modules/auth/reset_password.js' %}"></script>{% endblock %}
